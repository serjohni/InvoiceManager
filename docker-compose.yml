services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    user: root
    restart: unless-stopped
    environment:
      N8N_USER_FOLDER: /home/node/.n8n
      N8N_SECURE_COOKIE: false
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: ${N8N_PUBLIC_BASE_URL}
      WEBHOOK_URL: ${N8N_PUBLIC_BASE_URL}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      NODES_EXCLUDE: "[]"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - /mnt/nas_mount/07. Other/invoice-manager:/home/node/nas_files

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      FRONTEND_DIST_PATH: /app/BackEnd/public
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/${N8N_WEBHOOK_PATH}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/BackEnd/uploads

  backend-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-build
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/BackEnd
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: ["npm", "run", "prisma:migrate:deploy"]

volumes:
  postgres_data:
  n8n_data:
  backend_uploads:
